name: Release Optimized

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (musl for static linking)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
            artifact_name: aegis-input
            asset_name: aegis-input-x86_64-unknown-linux-musl.tar.gz

          # Linux aarch64 (musl for static linking)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            artifact_name: aegis-input
            asset_name: aegis-input-aarch64-unknown-linux-musl.tar.gz

          # Linux ARMv7 (for Raspberry Pi and older devices)
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            use_cross: true
            artifact_name: aegis-input
            asset_name: aegis-input-armv7-unknown-linux-musleabihf.tar.gz

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            artifact_name: aegis-input
            asset_name: aegis-input-x86_64-apple-darwin.tar.gz

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            artifact_name: aegis-input
            asset_name: aegis-input-aarch64-apple-darwin.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross
        with:
          tool: cross

      # 缓存策略：加速构建
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      # 静态链接配置（仅 Linux）
      - name: Configure static linking
        if: contains(matrix.target, 'linux')
        run: |
          echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV

      # 优化构建
      - name: Build binary (optimized)
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      # 压缩二进制文件
      - name: Strip binary and create tarball
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release

          # Strip 符号表减小文件大小
          if [ "${{ runner.os }}" = "Linux" ]; then
            strip ${{ matrix.artifact_name }} || true
          fi

          # 创建压缩包
          tar czf ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          cd ../../..

          # 显示文件大小
          ls -lh ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          for dir in */; do
            cd "$dir"
            for file in *; do
              if [ -f "$file" ]; then
                sha256sum "$file" >> ../SHA256SUMS.txt
              fi
            done
            cd ..
          done
          cd ..

      - name: Display checksums
        run: cat artifacts/SHA256SUMS.txt

      - name: Create Release with all artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*/*.tar.gz
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## 🚀 Aegis Input ${{ github.ref_name }}

            ### 📦 下载说明

            **Linux (静态链接)**
            - `x86_64-unknown-linux-musl`: 适用于大多数 Linux 发行版
            - `aarch64-unknown-linux-musl`: 适用于 ARM64 Linux 服务器
            - `armv7-unknown-linux-musleabihf`: 适用于树莓派等设备

            **macOS**
            - `x86_64-apple-darwin`: Intel Mac
            - `aarch64-apple-darwin`: Apple Silicon (M1/M2/M3)

            ### 🔐 验证校验和

            ```bash
            # 下载后验证
            sha256sum -c SHA256SUMS.txt
            ```

            ### 📝 安装示例

            ```bash
            # Linux
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/aegis-input-x86_64-unknown-linux-musl.tar.gz
            tar xzf aegis-input-x86_64-unknown-linux-musl.tar.gz
            sudo mv aegis-input /usr/local/bin/

            # macOS
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/aegis-input-x86_64-apple-darwin.tar.gz -o aegis-input.tar.gz
            tar xzf aegis-input.tar.gz
            sudo mv aegis-input /usr/local/bin/
            ```

            ---
            自动构建于 ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
