name: Build Static Binaries

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev

      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build static binary
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Verify static linking
        run: |
          BINARY=target/${{ matrix.target }}/release/${{ github.event.repository.name }}

          echo "=== 检查二进制文件 ==="
          file $BINARY

          echo ""
          echo "=== 检查静态链接 ==="
          ldd $BINARY 2>&1 || echo "静态链接成功"

      - name: Test in Alpine Docker
        run: |
          BINARY=target/${{ matrix.target }}/release/${{ github.event.repository.name }}

          echo "=== 在 Alpine 中测试 ==="
          docker run --rm -v $(pwd):/app alpine:latest \
            sh -c "
              echo '二进制信息:' && file /app/$BINARY
              echo ''
              echo '测试运行:'
              /app/$BINARY --version || /app/$BINARY --help || echo '无可用的版本检查命令'
            "

      - name: Run tests
        run: |
          cargo test --release --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          strip --strip-all target/${{ matrix.target }}/release/${{ github.event.repository.name }}

      - name: Show binary size
        run: |
          ls -lh target/${{ matrix.target }}/release/${{ github.event.repository.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ github.event.repository.name }}
          retention-days: 7

  build-all:
    name: Create Release Bundle
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release bundle
        run: |
          mkdir -p release

          # 复制并重命名二进制文件
          for artifact in artifacts/binary-*/*; do
            if [ -f "$artifact" ]; then
              target=$(basename $(dirname "$artifact") | sed 's/binary-//')
              cp "$artifact" "release/${{ github.event.repository.name }}-$target"
              chmod +x "release/${{ github.event.repository.name }}-$target"
            fi
          done

          # 创建校验和
          cd release
          sha256sum * > SHA256SUMS.txt
          cd ..

          # 显示结果
          echo "=== Release Bundle ==="
          ls -lh release/

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Binary Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY

          for artifact in artifacts/binary-*/*; do
            if [ -f "$artifact" ]; then
              target=$(basename $(dirname "$artifact") | sed 's/binary-//')
              size=$(ls -lh "$artifact" | awk '{print $5}')
              echo "| $target | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done
